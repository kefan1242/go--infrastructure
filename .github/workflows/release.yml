name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      service:
        description: "Which kris-* service to build (default: kris-alpha)"
        required: false
        default: kris-alpha
      tag:
        description: "Image tag (default: short SHA)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write
  id-token: write    # required for cosign keyless OIDC signing

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [kris-alpha, kris-beta, kris-gamma]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image tag
        id: tag
        run: |
          if [ -n "${GITHUB_REF##refs/tags/}" ] && [ "${GITHUB_REF##refs/tags/}" != "$GITHUB_REF" ]; then
            echo "tag=${GITHUB_REF##refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute build args
        id: meta
        run: |
          echo "version=${{ steps.tag.outputs.tag }}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "buildtime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Each kris-* has the same Dockerfile shape (we templated kris-alpha's into
      # the scaffolder). For services without their own Dockerfile yet, fall back
      # to kris-alpha's and patch the binary name via build-arg.
      - name: Build & push (linux/amd64,linux/arm64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILDTIME=${{ steps.meta.outputs.buildtime }}
          provenance: true
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless, OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}

      - name: Print verification command
        run: |
          echo "Verify with:"
          echo "  cosign verify \\"
          echo "    --certificate-identity 'https://github.com/${{ github.repository }}/.github/workflows/release.yml@${{ github.ref }}' \\"
          echo "    --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \\"
          echo "    ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ steps.tag.outputs.tag }}"
