name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.25.x", "1.24.x"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Build all
        run: |
          go build ./pkg/...
          go build ./kris-alpha/...
          go build ./kris-beta/...
          go build ./kris-gamma/...

      - name: Vet
        run: |
          go vet ./pkg/...
          go vet ./kris-alpha/...
          go vet ./kris-beta/...
          go vet ./kris-gamma/...

      - name: Test + coverage
        run: |
          go test -race -count=1 -coverprofile=pkg/coverage.out ./pkg/...
          go tool cover -func=pkg/coverage.out | tail -1

      - name: Coverage gate (>= COVER_MIN, default 75%)
        if: matrix.go == '1.25.x'
        run: make cover-gate

      - name: Upload coverage artifact
        if: matrix.go == '1.25.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: pkg/coverage.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2
          args: --build-tags=integration ./pkg/... ./kris-alpha/... ./kris-beta/... ./kris-gamma/...
      - name: Install gofumpt + goimports
        run: |
          go install mvdan.cc/gofumpt@v0.7.0
          go install golang.org/x/tools/cmd/goimports@latest
      - name: fmt-check
        run: make fmt-check

  scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: Scaffold a service via new-service.sh
        run: bash scripts/new-service.sh smoke 50090 8190 8191
      - name: Build the scaffolded service
        run: |
          cd kris-smoke
          go build ./...
      - name: Test the scaffolded service
        run: |
          cd kris-smoke
          go test -race -count=1 ./...
      - name: Verify identifiers were rewritten
        run: |
          test -d kris-smoke/helm-charts
          grep -q "name: kris-smoke" kris-smoke/helm-charts/Chart.yaml
          grep -q "EXPOSE 50090" kris-smoke/Dockerfile
          grep -q "EXPOSE 8190" kris-smoke/Dockerfile
          grep -q "EXPOSE 8191" kris-smoke/Dockerfile
          grep -q '"kris-smoke"' kris-smoke/cmd/smoke/main.go
          ! grep -r "kris-alpha" kris-smoke/ || (echo "leftover kris-alpha refs"; exit 1)

  integration:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
        ports: ["3306:3306"]
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd="mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok'"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: Run pkg/data integration tests
        run: go test -tags integration -race -count=1 ./pkg/data/...
