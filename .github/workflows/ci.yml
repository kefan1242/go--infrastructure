name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.25.x", "1.24.x"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Build all
        run: |
          go build ./pkg/...
          go build ./kris-alpha/...
          go build ./kris-beta/...
          go build ./kris-gamma/...

      - name: Vet
        run: |
          go vet ./pkg/...
          go vet ./kris-alpha/...
          go vet ./kris-beta/...
          go vet ./kris-gamma/...

      - name: Test
        run: go test -race -count=1 ./pkg/...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          args: ./pkg/... ./kris-alpha/... ./kris-beta/... ./kris-gamma/...
