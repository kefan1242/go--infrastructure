version: 2

updates:
  - package-ecosystem: gomod
    directory: /pkg
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      otel:
        patterns: ["go.opentelemetry.io/*"]
      kratos:
        patterns: ["github.com/go-kratos/*"]
      grpc:
        patterns: ["google.golang.org/grpc*", "google.golang.org/protobuf*"]
      drivers:
        patterns: ["github.com/go-sql-driver/*", "github.com/redis/*", "go.mongodb.org/*"]
    labels: ["deps"]

  - package-ecosystem: gomod
    directory: /kris-alpha
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels: ["deps"]

  - package-ecosystem: gomod
    directory: /kris-beta
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels: ["deps"]

  - package-ecosystem: gomod
    directory: /kris-gamma
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels: ["deps"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: ["deps", "ci"]

  - package-ecosystem: docker
    directory: /kris-alpha
    schedule:
      interval: weekly
    labels: ["deps", "docker"]
